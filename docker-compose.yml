services:
  postgres:
    image: postgres:16-alpine
    container_name: beforesell-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: beforesell
      POSTGRES_PASSWORD: beforesell123
      POSTGRES_DB: beforesell
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
